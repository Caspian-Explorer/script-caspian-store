name: Scaffold — admin-routes drift

# Catches the v2.4 / v2.11 class of bug: an admin page added to
# DEFAULT_ADMIN_NAV in src/admin/admin-shell.tsx without a matching entry in
# the scaffolder's `adminRoutes` array — or vice versa. Fresh scaffolds then
# 404 on the nav link. See scripts/check-scaffold-routes.mjs for details.

on:
  push:
    branches: [main]
    paths:
      - 'src/admin/admin-shell.tsx'
      - 'scaffold/create.mjs'
      - 'scripts/check-scaffold-routes.mjs'
      - '.github/workflows/scaffold-routes-smoke.yml'
  pull_request:
    paths:
      - 'src/admin/admin-shell.tsx'
      - 'scaffold/create.mjs'
      - 'scripts/check-scaffold-routes.mjs'
      - '.github/workflows/scaffold-routes-smoke.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check scaffolder routes vs DEFAULT_ADMIN_NAV
        run: node scripts/check-scaffold-routes.mjs
